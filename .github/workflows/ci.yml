name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: server tests
        working-directory: server
        run: |
          bun install --frozen-lockfile
          bun test

      - name: web typecheck
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run typecheck
